# Render Blueprint — deploys this portfolio as a free Static Site.
# In Render: "New +" → "Blueprint" → connect the repo and it reads this file.
services:
  - type: web
    name: portfolio-sidt0518
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA fallback: serve index.html for any path (single-page app routing).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
